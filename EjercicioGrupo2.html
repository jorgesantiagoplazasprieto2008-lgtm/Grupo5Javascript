<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Notas</title>
</head>

<body>

    <h1>Sistema de Notas</h1>
    <p id="resultado"></p>
    <script>
        let GradosCelcius = 25;        
        let GradosFahrenheit = (GradosCelcius * 1.8) + 32;

        let resultado = document.getElementById("resultado");
        resultado.innerText = `${GradosCelcius}°C son ${GradosFahrenheit}°F`;        
    </script>

</body>

</html>
