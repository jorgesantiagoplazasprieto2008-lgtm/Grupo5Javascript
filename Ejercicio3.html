<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Función que Filtra una Lista de Productos en Oferta</title>
</head>

<body>

  <h1>Ejercicio 3: Función que Filtra una Lista de Productos en Oferta</h1>

  <h2>Productos en oferta:</h2>

  <!-- Lista donde se mostrarán los productos -->
  <ul id="listaProductos"></ul>

  <script>

    // Crear el arreglo de productos
    const productos = [
      { nombre: "Laptop", enOferta: true },
      { nombre: "Celular", enOferta: false },
      { nombre: "Tablet", enOferta: true },
      { nombre: "Monitor", enOferta: false },
    ];

    // Función flecha para filtrar productos en oferta
    const filtrarEnOferta = (productos) =>
      productos.filter((producto) => producto.enOferta);

    // Llamar la función
    let productosEnOferta = filtrarEnOferta(productos);

    // Obtener la lista del HTML
    let lista = document.getElementById("listaProductos");

    // Recorrer los productos en oferta
    productosEnOferta.forEach((producto) => {

      // Crear un elemento <li>
      let item = document.createElement("li");

      // Agregar el nombre del producto
      item.textContent = producto.nombre;

      // Insertar el elemento en la lista
      lista.appendChild(item);

    });

    // Mostrar también en consola
    console.log("Productos en oferta:", productosEnOferta);

  </script>

</body>

</html>
