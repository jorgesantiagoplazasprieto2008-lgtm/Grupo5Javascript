<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Notas</title>
</head>

<body>

    <h1>Sistema de Notas</h1>

    <script>

        // ==========================
        // COMPONENTE DE ENTRADA
        // ==========================

        function pedirNombre() {
            return prompt("Ingrese el nombre del estudiante:");
        }

        function pedirNota(numeroNota) {
            return parseFloat(
                prompt("Ingrese la nota #" + numeroNota + ":")
            );
        }


        // ==========================
        // COMPONENTE DE CÁLCULO
        // ==========================

        function calcularPromedio(n1, n2, n3) {
            return (n1 + n2 + n3) / 3;
        }


        // ==========================
        // COMPONENTE DE VALIDACIÓN
        // ==========================

        function obtenerEstado(promedio) {

            if (promedio >= 3.0) {
                return "APROBÓ";
            } else {
                return "REPROBÓ";
            }
        }


        // ==========================
        // COMPONENTE DE MENSAJE
        // ==========================

        function generarMensaje(estudiante) {

            return `
            ===== RESULTADO =====

            Estudiante: ${estudiante.nombre}

            Nota 1: ${estudiante.nota1}
            Nota 2: ${estudiante.nota2}
            Nota 3: ${estudiante.nota3}

            Promedio: ${estudiante.promedio.toFixed(2)}

            Estado: ${estudiante.estado}
            `;
        }


        // ==========================
        // COMPONENTE PRINCIPAL
        // ==========================

        function iniciarSistema() {

            let nombre = pedirNombre();

            let nota1 = pedirNota(1);
            let nota2 = pedirNota(2);
            let nota3 = pedirNota(3);

            let promedio = calcularPromedio(
                nota1,
                nota2,
                nota3
            );

            let estado = obtenerEstado(promedio);

            let estudiante = {
                nombre: nombre,
                nota1: nota1,
                nota2: nota2,
                nota3: nota3,
                promedio: promedio,
                estado: estado
            };

            let mensaje = generarMensaje(estudiante);

            alert(mensaje);
        }

        iniciarSistema();

    </script>

</body>

</html>
